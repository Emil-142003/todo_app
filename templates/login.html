{% extends "base.html" %}
{% block content %}
<div class="card p-4 p-md-5 mx-auto" style="max-width:430px;">
    <div class="text-center mb-4">
        <h3 style="color:#3d34b6; font-weight:700;">Welcome Back</h3>
        <p class="text-muted-soft mb-0">Manage your daily tasks beautifully.</p>
    </div>

    <form method="POST">
        <label class="form-label text-muted-soft mb-1" for="login-email">Email</label>
        <input id="login-email" type="email" name="email" class="form-control mb-3" placeholder="you@example.com" required>

        <label class="form-label text-muted-soft mb-1" for="login-password">Password</label>
        <input id="login-password" type="password" name="password" class="form-control mb-4" placeholder="Enter your password" required>

        <button class="btn btn-primary w-100 py-2" type="submit">Login</button>
    </form>

    <p class="text-center mt-3 mb-0 text-muted-soft">
        New here? <a href="/register">Create account</a>
    </p>
</div>
{% endblock %}
