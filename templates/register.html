{% extends "base.html" %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width:420px;">
    <h3 class="text-center mb-1">Create Account</h3>
    <p class="text-center text-muted-soft mb-4">Start organizing your tasks in minutes.</p>

    <form method="POST">
        <label class="form-label text-muted-soft mb-1">Name</label>
        <input type="text" name="name" class="form-control mb-3" placeholder="Your name" required>

        <label class="form-label text-muted-soft mb-1">Email</label>
        <input type="email" name="email" class="form-control mb-3" placeholder="you@example.com" required>

        <label class="form-label text-muted-soft mb-1">Password</label>
        <input type="password" name="password" class="form-control mb-4" placeholder="Create a password" required>

        <button class="btn btn-primary w-100">Register</button>
    </form>
    <p class="text-center mt-3 mb-0">
        <a href="/login">Already have an account?</a>
    </p>
</div>
{% endblock %}
