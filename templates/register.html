{% extends "base.html" %}
{% block content %}
<div class="card p-4 p-md-5 mx-auto" style="max-width:430px;">
    <div class="text-center mb-4">
        <h3 style="color:#3d34b6; font-weight:700;">Create Account</h3>
        <p class="text-muted-soft mb-0">Start organizing your tasks in minutes.</p>
    </div>

    <form method="POST">
        <label class="form-label text-muted-soft mb-1" for="register-name">Name</label>
        <input id="register-name" type="text" name="name" class="form-control mb-3" placeholder="Your name" required>

        <label class="form-label text-muted-soft mb-1" for="register-email">Email</label>
        <input id="register-email" type="email" name="email" class="form-control mb-3" placeholder="you@example.com" required>

        <label class="form-label text-muted-soft mb-1" for="register-password">Password</label>
        <input id="register-password" type="password" name="password" class="form-control mb-4" placeholder="Create a password" required>

        <button class="btn btn-primary w-100 py-2" type="submit">Register</button>
    </form>
    <p class="text-center mt-3 mb-0 text-muted-soft">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>
{% endblock %}
